# Integration tests (@SpringBootTest) run against the local Datastore emulator.
spring.cloud.gcp.datastore.project-id=ci-failure-analyst
spring.cloud.gcp.datastore.emulator.enabled=true

# GitHub client config needed for the full app context to start.
# Token stays empty in tests — they must never hit real GitHub (use MockRestServiceServer).
github.api.base-url=https://api.github.com
github.token=
