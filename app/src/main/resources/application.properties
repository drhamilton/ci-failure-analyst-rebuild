spring.cloud.gcp.datastore.project-id=ci-failure-analyst
# Emulator config lives in the "local" profile (application-local.properties).
# Run with -Dspring.profiles.active=local to use the Datastore emulator.
github.api.base-url=https://api.github.com
github.token=${GITHUB_TOKEN:}
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}

# Basic-auth credentials for /results. Username defaults; password is mandatory
# (no default) so the app fails to start rather than boot with a guessable one.
spring.security.user.name=${RESULTS_USER:results}
spring.security.user.password=${RESULTS_PASSWORD}

resilience4j.retry.instances.github.max-attempts=3
resilience4j.retry.instances.github.wait-duration=200ms
resilience4j.retry.instances.github.enable-exponential-backoff=true
resilience4j.retry.instances.github.exponential-backoff-multiplier=2
resilience4j.retry.instances.github.retry-exceptions[0]=org.springframework.web.client.HttpServerErrorException
resilience4j.retry.instances.github.retry-exceptions[1]=org.springframework.web.client.ResourceAccessException
resilience4j.retry.instances.github.ignore-exceptions[0]=org.springframework.web.client.HttpClientErrorException
